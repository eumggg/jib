services:
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: jib_postgres
    environment:
      POSTGRES_USER: jib
      POSTGRES_PASSWORD: jib_dev
      POSTGRES_DB: jib
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jib -d jib"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
