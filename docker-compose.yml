services:
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: jib_postgres
    environment:
      POSTGRES_USER: jib
      POSTGRES_PASSWORD: jib_dev
      POSTGRES_DB: jib
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jib -d jib"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jib_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgres://jib:jib_dev@db:5432/jib
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-change-me}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-jib-demo}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      # Connect to the Firebase Auth Emulator running on the host in local dev.
      # Remove this line (or override with empty string) when using real credentials.
      FIREBASE_AUTH_EMULATOR_HOST: ${FIREBASE_AUTH_EMULATOR_HOST:-host.docker.internal:9099}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    # Run migrations then start the compiled server.
    command: sh -c "npm run migrate:up && node dist/index.js"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
